name: Daily Digest

on:
  schedule:
    # 北京时间 8:30 / 12:00 / 17:30（UTC 0:30 / 4:00 / 9:30）
    - cron: '30 0 * * *'   # 早报 8:30 CST
    - cron: '0 4 * * *'    # 午报 12:00 CST
    - cron: '30 9 * * *'   # 晚报 17:30 CST
  workflow_dispatch:  # 手动触发

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          WECOM_CORP_ID: ${{ secrets.WECOM_CORP_ID }}
          WECOM_CORP_SECRET: ${{ secrets.WECOM_CORP_SECRET }}
          WECOM_AGENT_ID: ${{ secrets.WECOM_AGENT_ID }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          TZ: Asia/Shanghai
        run: python main.py digest
